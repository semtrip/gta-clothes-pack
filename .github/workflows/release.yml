# Страница GitHub Releases + вложение gta-clothes-pack.exe создаются здесь (softprops/action-gh-release).
# Пуше тега v* — не создавайте релиз вручную через gh / веб-интерфейс: дождитесь этого workflow.
name: Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt
          pip install -e .

      - name: PyInstaller
        run: python -m PyInstaller --noconfirm --clean gta-clothes-pack.spec

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: gta-clothes-pack-windows
          path: dist/gta-clothes-pack.exe

      - name: GitHub Release with EXE (from tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/gta-clothes-pack.exe
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
